# config/lexicons/domestic.yaml
# Palabras de domesticidad para el Índice de Domesticidad (Id)
# Fórmula: Id = Σ(matches_lema) / total_tokens_alpha * 1000
#
# Se comparan LEMAS (token.lemma_.lower()), no formas superficiales,
# por lo que cada entrada cubre todas sus formas flexionadas.
# Ejemplo: "casar" cubre casado/casada/casados/casadas.
#
# Añadir o quitar términos editando este fichero. No requiere
# reconstruir el contenedor Docker.
#
# v2.0 — cobertura ampliada con términos adicionales de biología familiar,
# roles de cuidado, vida doméstica y referencias personales.

version: "2.0"

