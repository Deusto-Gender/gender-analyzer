# config/lexicons/epistemic.yaml
# Léxicos para la Densidad Epistémica
# Fórmula: D_e = adj_intelecto / (adj_intelecto + adj_personalidad)
#
# Los adjetivos se comparan por LEMA (token.lemma_.lower()).
# Estrategia de clasificación:
#   1. Coincidencia directa con este léxico (prioridad máxima)
#   2. Expansión vía WordNet-es (sinónimos automáticos, si está disponible)
#   3. Embeddings de spaCy para vecinos semánticos (umbral configurable)
#
# v2.0 — cobertura ampliada de términos epistémicos y de personalidad frecuentes
# en biografías científicas en español. Se añaden participios adjetivales de uso
# común en Wikipedia ES para describir la trayectoria de investigadores.

version: "2.0"

# Umbral de similitud semántica para expansión por embeddings (0.0-1.0)
semantic_expansion_threshold: 0.72

