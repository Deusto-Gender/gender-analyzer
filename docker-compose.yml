services:

  wikipedia-extractor:
    build:
      context: ./services/wikipedia-extractor
    container_name: wba-wikipedia-extractor
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - wiki-cache:/app/cache
      - ./config:/app/config:ro
    networks:
      - wba-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')\" || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  nlp-analyzer:
    build:
      context: ./services/nlp-analyzer
    container_name: wba-nlp-analyzer
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ./config:/app/config:ro
    environment:
      - CONFIG_DIR=/app/config
    networks:
      - wba-net
    # spaCy es_core_news_lg needs ~1.5 GB RAM at runtime.
    # Docker Desktop -> Settings -> Resources -> Memory -> 4096 MB
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')\" || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 8
      start_period: 60s

  llm-auditor:
    build:
      context: ./services/llm-auditor
    container_name: wba-llm-auditor
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - NLP_SERVICE_URL=http://nlp-analyzer:8002
    networks:
      - wba-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health')\" || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: wba-api-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - WIKI_SERVICE_URL=http://wikipedia-extractor:8001
      - NLP_SERVICE_URL=http://nlp-analyzer:8002
      - LLM_SERVICE_URL=http://llm-auditor:8003
      - CONFIG_DIR=/app/config
    volumes:
      - results-data:/app/data
      - ./config:/app/config:ro
    networks:
      - wba-net
    depends_on:
      wikipedia-extractor:
        condition: service_healthy
      nlp-analyzer:
        condition: service_healthy
      llm-auditor:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./services/frontend
    container_name: wba-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - API_GATEWAY_URL=http://localhost:8000
    networks:
      - wba-net
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  wiki-cache:
    name: wba-wiki-cache
  results-data:
    name: wba-results-data

networks:
  wba-net:
    name: wba-net
    driver: bridge
